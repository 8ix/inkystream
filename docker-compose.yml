version: '3.8'
services:
  inkystream:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: inkystream
    restart: unless-stopped
    environment:
      - INKYSTREAM_API_KEY=${INKYSTREAM_API_KEY:-}
      - PORT=3000
      - NODE_ENV=production
    volumes:
      - ./images:/app/images
      - ./config:/app/config
    labels:
      # Enable Traefik
      - "traefik.enable=true"
      
      # HTTPS Router - Fixed escaping
      - "traefik.http.routers.inkystream.rule=Host(`inkystream.andbert.com`)"
      - "traefik.http.routers.inkystream.entrypoints=websecure"
      - "traefik.http.routers.inkystream.tls=true"
      - "traefik.http.routers.inkystream.tls.certresolver=letsencrypt"
      
      # Service configuration
      - "traefik.http.services.inkystream.loadbalancer.server.port=3000"
      # Use container name for service discovery (if Traefik is on same network)
      - "traefik.http.services.inkystream.loadbalancer.server.scheme=http"
    networks:
      - bridge
      # Uncomment and set to your Traefik network name if Traefik is on a custom network:
      # - traefik_network
networks:
  bridge:
    external: true
  # Uncomment and configure if Traefik is on a custom network:
  # traefik_network:
  #   external: true
  #   name: your_traefik_network_name
