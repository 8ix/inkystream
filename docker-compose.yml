version: '3.8'
services:
  inkystream:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: inkystream
    restart: unless-stopped
    environment:
      - INKYSTREAM_API_KEY=${INKYSTREAM_API_KEY:-}
      - PORT=3000
      - NODE_ENV=production
    volumes:
      # Persist images directory - user uploads and processed images
      - ./images:/app/images
      # Persist config directory - categories, devices, and display configs
      # These files persist across container rebuilds and updates
      - ./config:/app/config
    labels:
      # Enable Traefik
      - "traefik.enable=true"
      
      # HTTPS Router - Fixed escaping
      - "traefik.http.routers.inkystream.rule=Host(`inkystream.andbert.com`)"
      - "traefik.http.routers.inkystream.entrypoints=websecure"
      - "traefik.http.routers.inkystream.tls=true"
      - "traefik.http.routers.inkystream.tls.certresolver=letsencrypt"
      
      # Service configuration
      - "traefik.http.services.inkystream.loadbalancer.server.port=3000"
      - "traefik.http.services.inkystream.loadbalancer.server.scheme=http"
    # Use bridge network mode to connect to same network as Traefik
    network_mode: bridge
